        const currentVilla = villas.find(v => v.id === villaId);

        async function loadVillaData() {
            if (!currentVilla) {
                renderNotFoundError();
                return;
            }

            let galleryImages = [currentVilla.img];
            let descriptionHTML = "";

            try {
                const response = await fetch(`villa-detail/${villaId}.html`);
                if (response.ok) {
                    const htmlText = await response.text();
                    const doc = new DOMParser().parseFromString(htmlText, 'text/html');

                    const extractedImgLinks = Array.from(doc.querySelectorAll('a[href*="public/villa/"]'))
                        .map(a => a.getAttribute('href').replace(/^\.\.\//, ''));

                    const extractedImgTags = Array.from(doc.querySelectorAll('img[src*="public/villa/"]'))
                        .map(img => img.getAttribute('src').replace(/^\.\.\//, ''));

                    const combinedPaths = [...extractedImgLinks, ...extractedImgTags];
                    const uniquePaths = [...new Set(combinedPaths)].filter(p => p && p.trim() !== "");

                    if (uniquePaths.length > 0) {
                        galleryImages = uniquePaths;
                    }
                }
            } catch (err) {
                console.error("Error loading villa details:", err);
            }

            activeGalleryImages = galleryImages;
            
            const professionalDesc = getModernDescription(currentVilla);
            renderPage(currentVilla, galleryImages, professionalDesc);
        }

                </div>

            let priceDisplay = villa.isPerPersonOffer 
                ? `<div class="flex items-baseline justify-between border-b border-gray-700 pb-4 mb-4">

                : `<div class="space-y-3 border-b border-gray-700 pb-4 mb-4">

            `;

            mainContent.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 pt-8 pb-4 animate-fade-in">

                            <div class="grid grid-cols-2 md:grid-cols-3 gap-5">

                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-wifi text-[#d4af37] text-xl w-6"></i> High-Speed WiFi</div>
                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-tv text-[#d4af37] text-xl w-6"></i> Smart TV with Streaming</div>
                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-dice-d6 text-[#d4af37] text-xl w-6"></i> Indoor Games</div>
                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-utensils text-[#d4af37] text-xl w-6"></i> Private Chef Available</div>
                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-car text-[#d4af37] text-xl w-6"></i> Secure Parking</div>
                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-bolt text-[#d4af37] text-xl w-6"></i> 24/7 Power Backup</div>
                                <div class="flex items-center gap-3 text-gray-300 hover:text-[#d4af37] transition p-2 rounded-lg hover:bg-gray-800/30"><i class="fa-solid fa-fire-burner text-[#d4af37] text-xl w-6"></i> BBQ & Bonfire Setup</div>
                            </div>

                        <!-- House Rules & Policies -->

                                <i class="fa-regular fa-rectangle-list"></i> House Rules & Policies

                            <div class="space-y-4">
                                <div class="bg-gray-900/50 rounded-xl p-5 border border-gray-800">
                                    <h4 class="font-semibold text-white mb-3 flex items-center gap-2"><i class="fa-regular fa-clock text-[#d4af37]"></i> Check-in / Check-out</h4>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-400">
                                        <div><span class="text-[#d4af37]">Check-in:</span> 1:00 PM</div>
                                        <div><span class="text-[#d4af37]">Check-out:</span> 11:00 AM</div>
                                    </div>
                                    <p class="text-xs text-gray-500 mt-2">Early check-in and late check-out subject to availability.</p>
                                </div>

                                <div class="bg-gray-900/50 rounded-xl p-5 border border-gray-800">
                                    <h4 class="font-semibold text-white mb-3 flex items-center gap-2"><i class="fa-regular fa-id-card text-[#d4af37]"></i> Guest Registration</h4>
                                    <p class="text-sm text-gray-400">Valid government-issued photo identification is required for all guests at check-in.</p>
                                </div>

                                <div class="bg-gray-900/50 rounded-xl p-5 border border-gray-800">
                                    <h4 class="font-semibold text-white mb-3 flex items-center gap-2"><i class="fa-solid fa-shield-heart text-[#d4af37]"></i> Security Deposit</h4>

                                <div class="bg-gray-900/50 rounded-xl p-5 border border-gray-800">
                                    <h4 class="font-semibold text-white mb-3 flex items-center gap-2"><i class="fa-solid fa-ban text-[#d4af37]"></i> Guest Policies</h4>
                                    <ul class="text-sm text-gray-400 space-y-2">

                                        <li><i class="fa-solid fa-check text-green-500 mr-2 w-4"></i> Smoking permitted only in designated outdoor areas</li>
                                        <li><i class="fa-solid fa-xmark text-red-500 mr-2 w-4"></i> Pets are not allowed</li>
                                        <li><i class="fa-solid fa-xmark text-red-500 mr-2 w-4"></i> Loud music and parties after 10:00 PM are prohibited</li>

                                    <h4 class="font-semibold text-white mb-3 flex items-center gap-2"><i class="fa-solid fa-champagne-glasses text-[#d4af37]"></i> Dining Services</h4>

                                </div>

                        </div>

                        <!-- Cancellation Policy -->
                        <div>
                            <h3 class="serif text-2xl text-[#d4af37] mb-4 border-b border-gray-800 pb-2 flex items-center gap-2">
                                <i class="fa-regular fa-calendar-xmark"></i> Cancellation Policy
                            </h3>
                            <div class="space-y-2 text-sm text-gray-400">
                                <p>• <span class="text-white">Free cancellation</span> - 15 days or more before check-in</p>
                                <p>• <span class="text-yellow-500">50% refund</span> - Cancellations made 7-14 days before check-in</p>

                    </div>

                    <!-- Booking Card - WhatsApp Only -->

                                <div class="mt-4">
                                    ${priceDisplay}
                                </div>

                            <div class="bg-gray-800/30 rounded-xl p-4 mb-6">
                                <div class="flex justify-between text-sm py-2 border-b border-gray-700">
                                    <span class="text-gray-400">Security Deposit</span>
                                    <span class="text-white font-medium">₹7,000 (100% Refundable)</span>
                                </div>
                                <div class="flex justify-between text-sm py-2 border-b border-gray-700">
                                    <span class="text-gray-400">Max Capacity</span>
                                    <span class="text-white font-medium">${villa.bhk * 2 + 4} Guests</span>
                                </div>
                                <div class="flex justify-between text-sm py-2">
                                    <span class="text-gray-400">Extra Guest</span>
                                    <span class="text-white font-medium">₹1,500/person (subject to capacity)</span>

                            </div>
                            
                            <p class="text-xs text-gray-500 mb-6 text-center">For bookings and availability, our concierge team is just a message away.</p>
                            
                            <a href="${whatsappUrl}" target="_blank" rel="noopener noreferrer"
                               class="block w-full bg-[#25D366] hover:bg-[#1ebe5d] text-white text-center font-bold py-4 rounded-xl transition duration-300 shadow-lg flex items-center justify-center gap-3 group">
                                <i class="fa-brands fa-whatsapp text-2xl group-hover:scale-110 transition"></i> 
                                <span>Inquire on WhatsApp</span>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderNotFoundError() {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-[60vh] text-center px-4">
                    <i class="fa-regular fa-building text-6xl text-gray-700 mb-6"></i>
                    <h2 class="serif text-3xl text-white mb-4">Villa Not Found</h2>
                    <p class="text-gray-400 mb-8 max-w-md">The property you're looking for may have been removed or the link is invalid.</p>
                    <a href="villa-list.html" class="bg-[#d4af37] text-black px-8 py-3 font-bold uppercase tracking-widest text-xs rounded-full hover:bg-yellow-500 transition shadow-lg">Browse Our Collection</a>
                </div>
            `;
        }

        // Gallery Functions
        function openGallery(index = 0) {
            currentImageIndex = index;
            updateModalImage();
            galleryModal.classList.remove('hidden');
            galleryModal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeGallery() {
            galleryModal.classList.add('hidden');
            galleryModal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        function changeImage(step) {
            currentImageIndex += step;
            if (currentImageIndex >= activeGalleryImages.length) currentImageIndex = 0;
            else if (currentImageIndex < 0) currentImageIndex = activeGalleryImages.length - 1;
            updateModalImage();
        }

        function updateModalImage() {
            modalMainImage.style.opacity = '0';
            setTimeout(() => {
                modalMainImage.src = activeGalleryImages[currentImageIndex];
                if (galleryCount) galleryCount.innerText = `${currentImageIndex + 1} / ${activeGalleryImages.length}`;
                modalMainImage.style.opacity = '1';
            }, 150);
        }

        document.addEventListener('keydown', (e) => {
            if (galleryModal && !galleryModal.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'Escape') closeGallery();
            }
        });

        window.onload = function() {
            loadVillaData();
        };
    </script>
    <script src="public/villago-theme.js" defer></script>
</body>
</html>
